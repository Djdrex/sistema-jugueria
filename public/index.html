<!DOCTYPE html>
<html>
<head>
<title>Sistema PRO</title>
<script src="/socket.io/socket.io.js"></script>
</head>

<body style="background:#111;color:white;font-family:Arial">

<div id="loginDiv">
  <h2>Login</h2>
  <input id="user"><br><br>
  <input id="pass" type="password"><br><br>
  <button onclick="login()">Entrar</button>
</div>

<div id="app" style="display:none">
  <h2 id="info"></h2>
  <div id="tabs"></div>
  <div id="contenido"></div>
</div>

<div style="position:absolute; top:10px; right:20px;">
  <button onclick="toggleNotificaciones()">
    🔔 <span id="contadorNoti"></span>
  </button>
</div>

<div id="panelNoti" style="
  position:fixed;
  right:0;
  top:0;
  width:300px;
  height:100%;
  background:#222;
  display:none;
  overflow-y:auto;
  padding:10px;
">
  <button onclick="limpiarNotificaciones()">🧹 Limpiar todo</button>
</div>

<script>
const socket = io();
let token="", rol="", username="";
let pedidoActual=[];
let productoSeleccionado=null;
let sonidoActivo = false;
let audio = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");
let pedidosPrevios = [];
let notificaciones = [];

// ==========================
// LOGIN
// ==========================
async function login(){
  try {
    const res = await fetch("/login",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        username:document.getElementById("user").value,
        password:document.getElementById("pass").value
      })
    });

    const data = await res.json();

    console.log("RESPUESTA LOGIN:", data);
    console.log("ROL recibido:", data.rol);
    if(data.token){
      token=data.token;
      rol=data.rol;
      username=data.username;

      document.getElementById("loginDiv").style.display="none";
      document.getElementById("app").style.display="block";
      document.getElementById("info").innerText=username+" ("+rol+")";

      cargarTabs();
      cargarNotificaciones();
    } else {
      alert("❌ Usuario o contraseña incorrectos");
    }

  } catch(err){
    console.error("ERROR LOGIN:", err);
    alert("❌ Error conectando con el servidor");
  }
}

// Activar sonido (hack navegador)
document.body.addEventListener("click", () => {
  if(!sonidoActivo){
    audio.play().then(()=>{
      audio.pause();
      audio.currentTime = 0;
      sonidoActivo = true;
    }).catch(()=>{});
  }
}, { once: true });

window.login = login;

// ==========================
// TABS
// ==========================
function cargarTabs(){

  let html = "";

  if(rol === "mesero" || rol === "admin"){
    html += "<button onclick='verPedidos()'>Pedidos</button>";
  }

  if(rol === "barra" || rol === "admin"){
    html += "<button onclick='verBarra()'>Barra</button>";
  }

  if(rol === "admin"){
    html += "<button onclick='verInventario()'>Inventario</button>";
    html += "<button onclick='verInformes()'>Informes</button>";
    html += "<button onclick='verUsuarios()'>Usuarios</button>";
    html += "<button onclick='verDashboard()'>Dashboard</button>";
    html += "<button onclick='resetSistema()'>RESET</button>";
  }

  document.getElementById("tabs").innerHTML = html;
}

// ==========================
// DASHBOARD
// ==========================
function verDashboard(){
  document.getElementById("contenido").innerHTML = 
  "<h3>Dashboard</h3>" +

  "<div id='stats'></div>" +

  "<h4>Productos más vendidos</h4>" +
  "<div id='topProductos'></div>";

  cargarDashboard();
}

// ==========================
async function cargarDashboard(){

  const res = await fetch("/pedidos");
  const pedidos = await res.json();

  let totalVentas = 0;
  let pedidosHoy = 0;

  let productos = {};

  const hoy = new Date().toDateString();

  pedidos.forEach(p=>{

    if(p.estado === "entregado" && p.pagado){
  totalVentas += p.total;

      const fechaPedido = new Date(p.fecha);
      if(!isNaN(fechaPedido) && fechaPedido.toDateString() === hoy){
      pedidosHoy++;
      }
      p.items.forEach(i=>{
        if(!productos[i.producto]){
          productos[i.producto] = 0;
        }
        productos[i.producto]++;
      });
    }

  });

  // 🔥 TOP PRODUCTOS
  const top = Object.entries(productos)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,5);

  // 📊 STATS
  document.getElementById("stats").innerHTML =
    "💰 Ventas totales: S/" + totalVentas + "<br>" +
    "📦 Pedidos hoy: " + pedidosHoy + "<br>";

  // 🧃 TOP PRODUCTOS
  const cont = document.getElementById("topProductos");
  cont.innerHTML = "";

  top.forEach(p=>{
    cont.innerHTML += p[0] + " (" + p[1] + ")<br>";
  });

}
  
async function cargarNotificaciones(){
  const res = await fetch("/notificaciones",{
    headers:{ "Authorization":token }
  });

  notificaciones = await res.json();

  renderNotificaciones();
}
  function renderNotificaciones(){

  const panel = document.getElementById("panelNoti");
  const contador = document.getElementById("contadorNoti");

  panel.innerHTML = ""; // 🔥 LIMPIAR ANTES

  let noLeidas = 0;

  notificaciones.forEach(n=>{

    if(!n.leido) noLeidas++;

    let color = "#333";

    if(n.mensaje.includes("Stock bajo")){
      color = "#552222";
    }

    if(n.mensaje.includes("Nuevo pedido")){
      color = "#223355";
    }

    panel.innerHTML += 
  "<div style='border-bottom:1px solid gray; padding:5px; background:"+color+"'>" +
  "<b>" + n.usuario + "</b><br>" +
  n.mensaje + "<br>" +
  "<small>" + new Date(n.fecha).toLocaleString() + "</small><br>" +
  "<button onclick='eliminarNoti(\"" + n._id + "\")'>🗑️</button>" +
  "</div>";
  });

  contador.innerText = noLeidas > 0 ? "(" + noLeidas + ")" : "";
}
  function toggleNotificaciones(){
  const panel = document.getElementById("panelNoti");

  if(panel.style.display === "none" || panel.style.display === ""){
    panel.style.display = "block";
    marcarLeido();
  } else {
    panel.style.display = "none";
  }
}
async function marcarLeido(){
  await fetch("/notificaciones/leido",{
    method:"PUT",
    headers:{ "Authorization":token }
  });

  cargarNotificaciones();
}
  async function eliminarNoti(id){
  await fetch("/notificaciones/" + id,{
    method:"DELETE",
    headers:{ "Authorization":token }
  });

  await cargarNotificaciones();
}
  async function limpiarNotificaciones(){
  if(!confirm("¿Eliminar todas las notificaciones?")) return;

  await fetch("/notificaciones",{
    method:"DELETE",
    headers:{ "Authorization":token }
  });

  cargarNotificaciones();
}

async function resetSistema(){

  const confirmacion = prompt("Escribe CONFIRMAR para reiniciar");

  if(confirmacion !== "CONFIRMAR"){
    alert("Cancelado");
    return;
  }

  await fetch("/reset",{
    method:"DELETE",
    headers:{
      "Authorization":token,
      "Content-Type":"application/json"
    },
    body: JSON.stringify({ confirmacion })
  });

  alert("✅ Sistema reiniciado");
  socket.emit("actualizar_manual");
}

// PEDIDOS
// ==========================
function verPedidos(){
  document.getElementById("contenido").innerHTML = 

  "<h3>Crear Pedido</h3>" +

  "Buscar:<input id='buscador' onkeyup='buscarProducto()'><br>" +

  "<button onclick='enviarPedido()'>Enviar Pedido</button>" +

  "<hr><h3>💰 Cobrar Pedidos</h3>" +

}

// BUSCAR
async function buscarProducto(){
  const texto = document.getElementById("buscador").value.toLowerCase();
  const res = await fetch("/productos");
  const productos = await res.json();

  const cont = document.getElementById("resultados");
  cont.innerHTML = "";

  productos.forEach(p=>{
    if(p.nombre && p.nombre.toLowerCase().includes(texto)){

      const btn = document.createElement("button");
      btn.innerText = p.nombre + " - S/" + p.precio;

      btn.onclick = function(){
        seleccionarProducto(p.nombre, p.precio, p.categoria);
      };

      cont.appendChild(btn);
      cont.appendChild(document.createElement("br"));
    }
  });
}

// SELECCIONAR
function seleccionarProducto(nombre,precio,categoria){

  productoSeleccionado = {nombre,precio,categoria};

  const cont = document.getElementById("opcionesJugo");
  cont.innerHTML = "";

  if(categoria && categoria.toLowerCase() === "jugo"){
    cont.innerHTML =
    "Sin azúcar <input type='checkbox' id='azucar'><br>" +
    "Helado <input type='checkbox' id='helado'><br>" +
    "Nota <input id='nota'><br>" +
    "<button onclick='agregarProducto()'>Agregar</button>";
  }else{
    agregarProducto();
  }
}

// AGREGAR
function agregarProducto(){

  if(!productoSeleccionado) return;

  let item = {
    producto: productoSeleccionado.nombre,
    precio: productoSeleccionado.precio
  };

  if(productoSeleccionado.categoria && productoSeleccionado.categoria.toLowerCase() === "jugo"){
    item.azucar = document.getElementById("azucar").checked;
    item.helado = document.getElementById("helado").checked;
    item.nota = document.getElementById("nota").value;
  }

  pedidoActual.push(item);

  productoSeleccionado = null;
  document.getElementById("opcionesJugo").innerHTML="";

  renderPreview();
}

// PREVIEW
function renderPreview(){
  const cont = document.getElementById("preview");
  cont.innerHTML="";

  pedidoActual.forEach((i,index)=>{
    cont.innerHTML += i.producto + " S/" + i.precio +
    " <button onclick='eliminarItem(" + index + ")'>❌</button><br>";
  });
}

function eliminarItem(i){
  pedidoActual.splice(i,1);
  renderPreview();
}

// ENVIAR
async function enviarPedido(){

  if(pedidoActual.length === 0){
    alert("Agrega productos");
    return;
  }

  const fecha = new Date();

  const res = await fetch("/pedidos",{
  method:"POST",
  headers:{
    "Content-Type":"application/json",
    "Authorization":token
  },
  body:JSON.stringify({
  mesa:document.getElementById("mesa").value,
  items:pedidoActual
})
 });

 const data = await res.json();

 if(data.error){
  alert("❌ " + data.error);
  return;
}

  pedidoActual = [];
  renderPreview();
  socket.emit("actualizar_manual");
}

// BARRA
// ==========================
function verBarra(){
  document.getElementById("contenido").innerHTML = 
  "<h3>Barra</h3>" +
  "<div id='lista' style='height:400px; overflow-y:auto; border:1px solid white; padding:10px;'></div>";


  cargarPedidos();
}

async function cargarPedidos(){
  const res = await fetch("/pedidos");
  const data = await res.json();

  const cont = document.getElementById("lista");
  const nuevosPedidos = data.length > pedidosPrevios.length;

  // Guardar posición scroll
  const scrollPos = cont.scrollTop;
  const atBottom = cont.scrollHeight - cont.clientHeight <= scrollPos + 50;

  cont.innerHTML = "";

  data.forEach(p => {

    if(p.estado === "entregado") return;

    let color = "#300";
    if(p.estado === "preparando") color = "#663300";
    if(p.estado === "listo") color = "#003300";

    const div = document.createElement("div");
    div.style.background = color;
    div.style.padding = "10px";
    div.style.margin = "5px";
    div.style.borderRadius = "8px";

    let html = "<b>Mesa " + p.mesa + "</b><br>";
    html += "<b>Total: S/ " + p.total + "</b><br>";

    let total = 0;

    p.items.forEach(i => {
    total += Number(i.precio);
    });

    let fecha = new Date(p.fecha);
    html += (isNaN(fecha) ? "Fecha inválida" : fecha.toLocaleString()) + "<br><br>";

    p.items.forEach(i => {
      html += "- " + String(i.producto);
      if(i.azucar) html += " | sin azúcar";
      if(i.helado) html += " | helado";
      if(i.nota) html += " | nota: " + String(i.nota);
      html += "<br>";
    });

    div.innerHTML = html;

    const btn1 = document.createElement("button");
    btn1.innerText = "Preparando";
    btn1.onclick = () => cambiarEstado(p._id, "preparando");

    const btn2 = document.createElement("button");
    btn2.innerText = "Listo";
    btn2.onclick = () => cambiarEstado(p._id, "listo");

    const btn3 = document.createElement("button");
    btn3.innerText = "Entregado";
    btn3.onclick = () => cambiarEstado(p._id, "entregado");

    div.appendChild(document.createElement("br"));
    div.appendChild(btn1);
    div.appendChild(btn2);
    div.appendChild(btn3);

    cont.appendChild(div);

  });

  // 🔥 AUTO SCROLL
  if(atBottom){
    cont.scrollTop = cont.scrollHeight;
  } else {
    cont.scrollTop = scrollPos;
  }

  // 🔊 SONIDO
  if(nuevosPedidos && sonidoActivo){
  audio.currentTime = 0;
  audio.play().catch(()=>{});
  }

  
  pedidosPrevios = data;
}

async function cargarPedidosMesero(){

  const res = await fetch("/pedidos");
  const data = await res.json();

  const cont = document.getElementById("listaCobros");
  cont.innerHTML = "";

  data.forEach(p => {

    // 🔥 SOLO PEDIDOS ENTREGADOS Y NO PAGADOS
    if(p.estado !== "entregado" || p.pagado) return;

    const div = document.createElement("div");
    div.style.border = "1px solid white";
    div.style.margin = "5px";
    div.style.padding = "10px";

    let html = "<b>Mesa " + p.mesa + "</b><br>";
    html += "Total: S/" + p.total + "<br><br>";

    p.items.forEach(i => {
      html += "- " + i.producto + "<br>";
    });

    div.innerHTML = html;

    const btn = document.createElement("button");
    btn.innerText = "💰 Cobrar";
    btn.onclick = () => cobrarPedido(p._id, p);

    div.appendChild(btn);

    cont.appendChild(div);
  });

}

function verInventario(){
  document.getElementById("contenido").innerHTML =
  "Nombre <input id='n'><br>" +
  "Precio <input id='p'><br>" +
  "Stock <input id='s'><br>" +
  "Categoria <select id='c'>" +

async function crearProducto(){
  await fetch("/productos",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":token
    },
    body:JSON.stringify({
      nombre:document.getElementById("n").value,
      precio:document.getElementById("p").value,
      stock:document.getElementById("s").value,
      categoria:document.getElementById("c").value
    })
  });

  socket.emit("actualizar_manual");
  cargarProductos();
}

async function cargarProductos(){
  const res = await fetch("/productos");
  const data = await res.json();

  const cont = document.getElementById("listaProd");
  cont.innerHTML="";

  data.forEach(p=>{
    // Creamos un contenedor para la fila
    const div = document.createElement("div");
    div.innerHTML = 
  p.nombre + " - S/" + p.precio +
  " | Stock: " + p.stock + " ";
    
  const btnMas = document.createElement("button");
   btnMas.innerText = "➕";
   btnMas.onclick = () => modificarStock(p._id, 1);

   const btnMenos = document.createElement("button");
   btnMenos.innerText = "➖";
   btnMenos.onclick = () => modificarStock(p._id, -1);

   div.appendChild(btnMas);
   div.appendChild(btnMenos);
    // Creamos el botón "sin errores"
    const btn = document.createElement("button");
    btn.innerText = "❌";
    btn.onclick = () => eliminarProducto(p._id);
    
    // Agregamos el botón al div, y el div al contenedor principal
    div.appendChild(btn);
    cont.appendChild(div);
  });
}

async function modificarStock(id, cambio){
  await fetch("/productos/"+id+"/stock",{
    method:"PUT",
    headers:{
      "Content-Type":"application/json",
      "Authorization":token
    },
    body:JSON.stringify({cambio})
  });

  cargarProductos();
}

async function eliminarProducto(id){
  await fetch("/productos/"+id,{
    method:"DELETE",
    headers:{ "Authorization":token }
  });

  cargarProductos();
}

function cobrarPedido(id, pedido){

  let html = `
    <h3>💰 Cobrar Pedido</h3>
    <b>Mesa ${pedido.mesa}</b><br><br>

    <button onclick="seleccionarTodo()">✅ Seleccionar todo</button>
    <button onclick="deseleccionarTodo()">❌ Limpiar</button>

    <h4>Selecciona productos</h4>
  `;

  let pagado = pedido.totalPagado || 0;

html += `<p>💰 Ya pagado: S/ ${pagado}</p>`;
html += `<p>🧾 Restante: S/ ${(pedido.total - pagado).toFixed(2)}</p><br>`;

pedido.items.forEach((item, index) => {

  html += `
    <input type="checkbox" class="itemCheck" data-precio="${item.precio}">
    ${item.producto} - S/${item.precio}
    <br>
  `;
});

  html += `
    <br>
    <button onclick="calcularTotalSeleccionado('${id}')">Calcular total</button>

    <div id="totalSeleccionado"></div>
  `;

  document.getElementById("contenido").innerHTML = html;
}

function seleccionarTodo(){
  document.querySelectorAll(".itemCheck").forEach(c => c.checked = true);
}

function deseleccionarTodo(){
  document.querySelectorAll(".itemCheck").forEach(c => c.checked = false);
}

function calcularTotalSeleccionado(id){

  const checks = document.querySelectorAll(".itemCheck");

  let total = 0;

  checks.forEach(c => {
    if(c.checked){
      total += Number(c.dataset.precio);
    }
  });

  if(total === 0){
    alert("Selecciona al menos un producto");
    return;
  }

  fetch("/pedidos")
    .then(res => res.json())
    .then(data => {

      const pedido = data.find(p => p._id === id);

      const pagado = Number(pedido.totalPagado || 0);
      const restante = Number(pedido.total) - pagado;

      if(total > restante){
      total = restante; 
     }
      
      total = Number(total.toFixed(2));

      document.getElementById("totalSeleccionado").innerHTML = `
        <h4>Total: S/ ${total}</h4>

        <button onclick="seleccionarMetodo('yape', '${id}', ${total})">Yape</button>
        <button onclick="seleccionarMetodo('efectivo', '${id}', ${total})">Efectivo</button>
      `;
    });
}

function seleccionarMetodo(metodo, id, total){

  const zona = document.getElementById("totalSeleccionado");

  if(!zona){
    alert("Error en interfaz de pago");
    return;
  }

  if(metodo === "yape"){
    zona.innerHTML = `
      <p>Pago con Yape por S/ ${total}</p>
      <button onclick="confirmarPago('${id}', ${total}, 'yape', null)">Confirmar</button>
    `;
  }

  if(metodo === "efectivo"){
    zona.innerHTML = `
      <p>Total: S/ ${total}</p>
      Recibido: <input id="recibido" type="number"><br><br>
      <button onclick="calcularVuelto('${id}', ${total})">Calcular vuelto</button>
      <div id="resultadoVuelto"></div>
    `;
  }
}

function calcularVuelto(id, total){

  const input = document.getElementById("recibido");

  if(!input){
    alert("Error: no se encontró el campo de pago");
    return;
  }

  const recibido = parseFloat(input.value);

  if(isNaN(recibido)){
    alert("Ingresa un monto válido");
    return;
  }

  if(recibido < total){
    alert("Monto insuficiente");
    return;
  }

  const vuelto = (recibido - total).toFixed(2);

  document.getElementById("resultadoVuelto").innerHTML = `
    Vuelto: S/ ${vuelto} <br><br>
    <button onclick="confirmarPago('${id}', ${total}, 'efectivo', ${recibido})">
      Confirmar pago
    </button>
  `;
}

async function confirmarPago(id, monto, metodo, recibido){

  const res = await fetch("/pedidos/" + id + "/pagar",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":token
    },
    body:JSON.stringify({
      monto,
      metodo,
      recibido
    })
  });

  const data = await res.json();

  if(data.error){
    alert("❌ " + data.error);
  } else {
    alert("✅ Pago registrado");
  }

  socket.emit("actualizar_manual");
  verPedidos();
}

function dividirCuenta(id, total){

  const personas = Number(document.getElementById("personas").value);

  if(!personas || personas <= 0){
    alert("Número inválido");
    return;
  }

  const porPersona = (total / personas).toFixed(2);

  let html = "<h4>Cada persona paga: S/ " + porPersona + "</h4>";

  for(let i=0; i<personas; i++){
    html += `
      Persona ${i+1} 
      <button onclick="confirmarPago('${id}', ${porPersona}, 'yape', null)">Yape</button>
      <button onclick="pagoEfectivoSeparado('${id}', ${porPersona})">Efectivo</button>
      <br><br>
    `;
  }

  document.getElementById("zonaPago").innerHTML = html;
}

function pagoEfectivoSeparado(id, monto){

  const recibido = prompt("Monto recibido:");

  if(!recibido || Number(recibido) < monto){
    alert("Monto insuficiente");
    return;
  }

  confirmarPago(id, monto, "efectivo", Number(recibido));
}

async function cargarUsuarios(){
  const res = await fetch("/usuarios",{
    headers:{ "Authorization":token }
  });

  const data = await res.json();

  const cont = document.getElementById("listaUsuarios");
  cont.innerHTML="";

  data.forEach(u=>{

    const div = document.createElement("div");

    let etiqueta = u.username + " (" + u.rol + ")";

    if(u.username === "admin@titan02"){
      etiqueta += " 🔥 ADMIN PRINCIPAL";
    }

    div.innerText = etiqueta + " ";

    // 🔴 ELIMINAR
    if(u.username !== "admin@titan02"){
      const btnDel = document.createElement("button");
      btnDel.innerText = "❌";
      btnDel.onclick = () => eliminarUsuario(u._id);
      div.appendChild(btnDel);
    }

    // 🔄 CAMBIAR ROL
    if(u.username !== "admin@titan02"){
      const select = document.createElement("select");

      ["mesero","barra","admin"].forEach(r=>{
        const op = document.createElement("option");
        op.value = r;
        op.innerText = r;
        if(r === u.rol) op.selected = true;
        select.appendChild(op);
      });

      select.onchange = () => cambiarRol(u._id, select.value);
      div.appendChild(select);
    }

    // 🔑 CAMBIAR PASSWORD
    const btnPass = document.createElement("button");
    btnPass.innerText = "🔑";
    btnPass.onclick = () => cambiarPasswordAdmin(u._id);
    div.appendChild(btnPass);

    cont.appendChild(div);
  });
}

// CAMBIAR ROL
async function cambiarRol(id, rol){
  await fetch("/usuarios/"+id+"/rol",{
    method:"PUT",
    headers:{
      "Content-Type":"application/json",
      "Authorization":token
    },
    body:JSON.stringify({rol})
  });

  cargarUsuarios();
}

// CAMBIAR PASSWORD (ADMIN)
async function cambiarPasswordAdmin(id){
  const nueva = prompt("Nueva contraseña:");

  if(!nueva) return;

  await fetch("/usuarios/"+id+"/password",{
    method:"PUT",
    headers:{
      "Content-Type":"application/json",
      "Authorization":token
    },
    body:JSON.stringify({nueva})
  });

  alert("✅ Contraseña actualizada");
}

async function eliminarUsuario(id){
  await fetch("/usuarios/"+id,{
    method:"DELETE",
    headers:{ "Authorization":token }
  });
}

function verInformes(){
  document.getElementById("contenido").innerHTML =
  "<h3>Reportes</h3>" +

  "Desde <input type='date' id='desde'><br>" +
  "Hasta <input type='date' id='hasta'><br><br>" +

  "<button onclick='generarReporte()'>Generar</button>" +

  "<div id='resultadoReporte'></div>";
}

async function generarReporte(){

  const desde = document.getElementById("desde").value;
  const hasta = document.getElementById("hasta").value;

  let url = "/reporte";

  if(desde && hasta){
    url += "?desde=" + desde + "&hasta=" + hasta;
  }

  const res = await fetch(url,{
    headers:{ "Authorization":token }
  });

  const data = await res.json();

  let html =
  "💰 Total vendido: S/" + data.total + "<br>" +
  "📦 Pedidos: " + data.cantidad + "<br><br>";

  data.pedidos.forEach(p=>{
    html += "🪑 Mesa " + p.mesa +
            " | S/" + p.total +
            " | " + new Date(p.fecha).toLocaleString() +
            "<br>";
  });

  document.getElementById("resultadoReporte").innerHTML = html;
}

async function cargarInformes(){
  const res = await fetch("/pedidos");
  const data = await res.json();

  const cont = document.getElementById("listaInf");
  cont.innerHTML="";

  data.forEach(p=>{
    if(p.estado==="entregado"){
      // Creamos un contenedor para la fila
      const div = document.createElement("div");
      div.innerText = "Mesa " + p.mesa + " S/" + p.total + " ";
      
      // Creamos el botón "sin errores"
      const btn = document.createElement("button");
      btn.innerText = "❌";
      btn.onclick = () => eliminarPedido(p._id);
      
      // Agregamos el botón al div, y el div al contenedor principal
      div.appendChild(btn);
      cont.appendChild(div);
    }
  });
}

async function eliminarPedido(id){
  await fetch("/pedidos/"+id,{
    method:"DELETE",
    headers:{ "Authorization":token }
  });
  socket.emit("actualizar_manual");
  await cargarInformes();
}
